<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<title>Compare Automotive Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#262626;--border2:#333;--orange:#e8570a;--orange2:#ff6b1a;--orange-dim:rgba(232,87,10,0.12);--text:#fff;--text2:#d4d4d4;--muted:#888;--muted2:#555;--green:#22c55e;--blue:#3b82f6;--red:#ef4444}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,87,10,0.18),transparent 70%),var(--bg);padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--orange);border-radius:12px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,0.5)}
.login-logo{text-align:center;margin-bottom:28px}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1}
.brand span{color:var(--orange)}
.brand-sub{font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:6px}
.lbl{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block;font-weight:600}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:13px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;width:100%;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:80px}
.btn{padding:13px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:inline-flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation}
.btn-or{background:var(--orange);color:#fff}
.btn-or:active{background:#c44808;transform:scale(0.98)}
.btn-gh{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-dn{background:var(--red);color:#fff}
.btn-bl{background:var(--blue);color:#fff}
.btn-sm{padding:8px 12px;font-size:11px}
.btn-lg{padding:14px 22px;font-size:14px}
.btn-fw{width:100%}
.app{min-height:100vh;display:flex;flex-direction:column}
.m-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;height:56px}
.m-icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.main{flex:1;padding:16px;padding-bottom:90px;overflow-x:hidden}
.hero{background:radial-gradient(ellipse at 90% 0%,rgba(232,87,10,0.18),transparent 60%),var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--orange)}
.hero-greeting{font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;font-weight:600}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;line-height:1.1}
.hero-title span{color:var(--orange)}
.hero-sub{font-size:13px;color:var(--muted)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.section-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.section-title span{color:var(--orange)}
.row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.row:active{background:var(--surface2)}
.row:last-child{border-bottom:none}
.row-icon{width:38px;height:38px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:800}
.row-icon.or{background:var(--orange-dim);color:var(--orange)}
.row-icon.bl{background:rgba(59,130,246,0.15);color:var(--blue)}
.row-icon.gn{background:rgba(34,197,94,0.15);color:var(--green)}
.row-icon.rd{background:rgba(239,68,68,0.15);color:var(--red)}
.row-body{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.row-sub-dot{color:var(--border2)}
.row-end{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.row-amount{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--orange);line-height:1}
.row-act{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.3);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.bdg{display:inline-flex;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.bw{background:rgba(232,87,10,0.15);color:var(--orange)}
.bp{background:rgba(59,130,246,0.15);color:var(--blue)}
.bd{background:rgba(34,197,94,0.15);color:var(--green)}
.bc{background:rgba(239,68,68,0.15);color:var(--red)}
.plate{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;color:var(--orange);background:var(--orange-dim);padding:2px 8px;border-radius:4px;display:inline-block}
.search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.search-wrap input{background:transparent;border:none;padding:6px 0;font-size:14px}
.search-icon{color:var(--muted);font-size:14px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:14px;opacity:0.5}
.empty-text{font-size:14px;margin-bottom:18px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:60;padding:6px 4px max(6px,env(safe-area-inset-bottom))}
.bnav-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2px}
.bni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border:none;background:none;font-family:'Barlow',sans-serif;border-radius:8px}
.bni-icon{font-size:18px}
.bni.active{color:var(--orange)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--orange);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
.modal-hd{padding:14px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.modal-x{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer}
.modal-bd{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.modal-ft{padding:14px 20px;padding-bottom:max(14px,env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:10px;position:sticky;bottom:0;background:var(--surface)}
.modal-ft .btn{flex:1}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.inv-screen{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.inv-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.inv-bar h2{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.inv-bar-actions{display:flex;gap:6px;flex-wrap:wrap}
.inv-doc{background:#fff;color:#111;max-width:780px;margin:16px auto;width:calc(100% - 24px);border-radius:6px;padding:28px 22px;font-family:'Barlow',sans-serif}
.inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.inv-co{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#111}
.inv-co span{color:#e8570a}
.inv-co-sub{font-size:11px;color:#666;margin-top:4px;line-height:1.7}
.inv-title-block{text-align:right}
.inv-word{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:3px;color:#e8570a;text-transform:uppercase;line-height:1}
.inv-num{font-size:12px;color:#666;margin-top:4px}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.inv-meta-block h4{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#999;margin-bottom:6px;font-weight:700}
.inv-meta-block p{font-size:12px;line-height:1.7;color:#111}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:12px}
.inv-table thead tr{background:#111}
.inv-table thead th{padding:9px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-weight:700}
.inv-table thead th:last-child{text-align:right}
.inv-table tbody tr{border-bottom:1px solid #eee}
.inv-table tbody td{padding:10px;color:#111}
.inv-table tbody td:last-child{text-align:right;font-weight:600}
.inv-totals{display:flex;justify-content:flex-end;margin-bottom:24px}
.inv-tot-box{width:240px}
.inv-tot-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:#555;border-bottom:1px solid #eee}
.inv-tot-final{display:flex;justify-content:space-between;padding:10px 14px;background:#e8570a;color:#fff;border-radius:4px;margin-top:6px;font-weight:700;font-size:15px}
.inv-footer{border-top:2px solid #e8570a;padding-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.inv-note{font-size:11px;color:#666;line-height:1.6;max-width:360px}
.inv-stamp{padding:8px 16px;border-radius:4px;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.inv-stamp.paid{background:#dcfce7;color:#166534}
.inv-stamp.unpaid{background:#fee2e2;color:#991b1b}
.line-item-row{display:grid;grid-template-columns:1fr 50px 70px 32px;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}
.line-item-row input{background:transparent;border:none;padding:6px 4px;font-size:13px}
.btn-rm{width:32px;height:32px;border-radius:6px;background:rgba(239,68,68,0.15);color:var(--red);border:none;font-size:14px;cursor:pointer}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:0 8px 24px rgba(34,197,94,0.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#fff}
.tab-strip{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-strip::-webkit-scrollbar{display:none}
.tab-strip-btn{padding:10px 16px;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;white-space:nowrap}
.tab-strip-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px}
.setting-row:last-child{border-bottom:none}
.setting-label{flex:1}
.setting-label-name{font-size:14px;font-weight:600;margin-bottom:2px}
.setting-label-desc{font-size:11px;color:var(--muted)}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left 0.2s}
.toggle.on{background:var(--orange)}
.toggle.on::after{left:22px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--orange)}
.sum-card.gn::before{background:var(--green)}
.sum-card.rd::before{background:var(--red)}
.sum-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;font-weight:600}
.sum-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;color:var(--orange)}
.sum-card.gn .sum-val{color:var(--green)}
.sum-card.rd .sum-val{color:var(--red)}
@media (min-width:768px){.main{padding:24px;max-width:780px;margin:0 auto;width:100%;padding-bottom:100px}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script>
var h=React.createElement;var useState=React.useState;var useEffect=React.useEffect;var GBP='\u00a3';
function ld(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function mid(arr){var m=0;for(var i=0;i<arr.length;i++){if(arr[i].id>m)m=arr[i].id;}return m+1;}
function fmt(n){return parseFloat(n||0).toFixed(2);}
function calcTotal(items){var t=0;for(var i=0;i<items.length;i++){t+=((parseFloat(items[i].qty)||0)*(parseFloat(items[i].price)||0));}return t;}
function padId(n,p){return '#'+(p||'')+String(n).padStart(4,'0');}
function todayDate(){return new Date().toISOString().slice(0,10);}
function getGreeting(){var hr=new Date().getHours();if(hr<12)return 'Good morning';if(hr<18)return 'Good afternoon';return 'Good evening';}
function statusBadge(s){if(s==='Booked')return 'bw';if(s==='In Progress')return 'bp';if(s==='Completed')return 'bd';if(s==='Cancelled')return 'bc';return 'bw';}
function statusColour(s){if(s==='Booked')return 'or';if(s==='In Progress')return 'bl';if(s==='Completed')return 'gn';if(s==='Cancelled')return 'rd';return 'or';}

function Badge(p){return h('span',{className:'bdg '+statusBadge(p.s)},p.s);}

function ConfirmDialog(p){
  return h('div',{className:'modal-ov',onClick:function(e){if(e.target===e.currentTarget)p.onCancel();}},
    h('div',{className:'modal',style:{maxWidth:380}},
      h('div',{className:'modal-handle'}),
      h('div',{className:'modal-hd'},h('div',{className:'modal-title'},p.title||'Confirm'),h('button',{className:'modal-x',onClick:p.onCancel},'\u2715')),
      h('div',{className:'modal-bd'},h('div',{style:{fontSize:14,color:'var(--text2)',lineHeight:1.6}},p.message)),
      h('div',{className:'modal-ft'},h('button',{className:'btn btn-gh',onClick:p.onCancel},'Cancel'),h('button',{className:'btn btn-dn',onClick:p.onConfirm},'Delete'))
    )
  );
}

// ── BOOKING MODAL ────────────────────────────────────────────────
function BookingModal(p){
  var d=p.booking||{};
  var s1=useState(d.customer||'');var cust=s1[0];var setCust=s1[1];
  var s2=useState(d.phone||'');var phone=s2[0];var setPhone=s2[1];
  var s3=useState(d.plate||'');var plate=s3[0];var setPlate=s3[1];
  var s4=useState(d.vehicle||'');var vehicle=s4[0];var setVehicle=s4[1];
  var s5=useState(d.service||'');var service=s5[0];var setService=s5[1];
  var s6=useState(d.date||todayDate());var date=s6[0];var setDate=s6[1];
  var s7=useState(d.time||'09:00');var time=s7[0];var setTime=s7[1];
  var s8=useState(d.price||'');var price=s8[0];var setPrice=s8[1];
  var s9=useState(d.status||'Booked');var status=s9[0];var setStatus=s9[1];
  var s10=useState(d.notes||'');var notes=s10[0];var setNotes=s10[1];
  function save(){
    if(!cust.trim()){p.onError('Customer name required');return;}
    if(!plate.trim()){p.onError('Reg required');return;}
    if(!service.trim()){p.onError('Service required');return;}
    p.onSave({id:d.id||0,customer:cust.trim(),phone:phone.trim(),plate:plate.trim().toUpperCase(),vehicle:vehicle.trim(),service:service.trim(),date:date,time:time,price:parseFloat(price)||0,status:status,notes:notes.trim()});
  }
  return h('div',{className:'modal-ov',onClick:function(e){if(e.target===e.currentTarget)p.onClose();}},
    h('div',{className:'modal'},
      h('div',{className:'modal-handle'}),
      h('div',{className:'modal-hd'},h('div',{className:'modal-title'},p.booking?'Edit Booking':'New Booking'),h('button',{className:'modal-x',onClick:p.onClose},'\u2715')),
      h('div',{className:'modal-bd'},
        h('div',null,h('label',{className:'lbl'},'Customer Name *'),h('input',{value:cust,placeholder:'John Smith',onChange:function(e){setCust(e.target.value);}})),
        h('div',null,h('label',{className:'lbl'},'Phone'),h('input',{type:'tel',value:phone,placeholder:'07700 900000',onChange:function(e){setPhone(e.target.value);}})),
        h('div',{className:'frow'},
          h('div',null,h('label',{className:'lbl'},'Reg *'),h('input',{value:plate,placeholder:'AB12 CDE',onChange:function(e){setPlate(e.target.value.toUpperCase());}})),
          h('div',null,h('label',{className:'lbl'},'Vehicle'),h('input',{value:vehicle,placeholder:'Ford Focus',onChange:function(e){setVehicle(e.target.value);}}))
        ),
        h('div',null,h('label',{className:'lbl'},'Service *'),h('input',{value:service,placeholder:'e.g. Full Service + MOT',onChange:function(e){setService(e.target.value);}})),
        h('div',{className:'frow'},
          h('div',null,h('label',{className:'lbl'},'Date'),h('input',{type:'date',value:date,onChange:function(e){setDate(e.target.value);}})),
          h('div',null,h('label',{className:'lbl'},'Time'),h('input',{type:'time',value:time,onChange:function(e){setTime(e.target.value);}}))
        ),
        h('div',{className:'frow'},
          h('div',null,h('label',{className:'lbl'},'Price ('+GBP+')'),h('input',{type:'number',value:price,step:'0.01',onChange:function(e){setPrice(e.target.value);}})),
          h('div',null,h('label',{className:'lbl'},'Status'),
            h('select',{value:status,onChange:function(e){setStatus(e.target.value);}},
              h('option',null,'Booked'),h('option',null,'In Progress'),h('option',null,'Completed'),h('option',null,'Cancelled')
            )
          )
        ),
        h('div',null,h('label',{className:'lbl'},'Notes'),h('textarea',{value:notes,onChange:function(e){setNotes(e.target.value);}}))
      ),
      h('div',{className:'modal-ft'},h('button',{className:'btn btn-gh',onClick:p.onClose},'Cancel'),h('button',{className:'btn btn-or',onClick:save},'Save'))
    )

// ── INVOICES ─────────────────────────────────────────────────────
function Invoices(p){
  var invoices=p.invoices;var setInvoices=p.setInvoices;

  var s2=useState(null);var preview=s2[0];var setPreview=s2[1];
  var s3=useState(null);var editor=s3[0];var setEditor=s3[1];
  var s4=useState('All');var filter=s4[0];var setFilter=s4[1];
  var s5=useState(null);var del=s5[0];var setDel=s5[1];
  var filtered=invoices.filter(function(i){
    var q=srch.toLowerCase();
    var m=q===''||i.customer.toLowerCase().indexOf(q)!==-1||(i.plate||'').toLowerCase().indexOf(q)!==-1;
    var fm=filter==='All'||(filter==='Paid'&&i.paid)||(filter==='Unpaid'&&!i.paid);
    return m&&fm;
  }).sort(function(a,b){return b.id-a.id;});
  var paid=0,owed=0;
  for(var i=0;i<invoices.length;i++){var g=calcTotal(invoices[i].items)*1.2;if(invoices[i].paid)paid+=g;else owed+=g;}
  function save(f){
    var next;

    else{next=invoices.map(function(x){if(x.id!==editor.id)return x;var c={};for(var k in f){c[k]=f[k];}c.id=editor.id;return c;});}
    setInvoices(next);setEditor(null);
  }
  function deleteInv(id){setInvoices(invoices.filter(function(x){return x.id!==id;}));setDel(null);setPreview(null);}
  if(editor)return h(InvoiceEditor,{invoice:editor==='new'?null:editor,onClose:function(){setEditor(null);},onSave:save,onError:p.showError});
  if(preview)return h(InvoicePreview,{inv:preview,settings:p.settings,onClose:function(){setPreview(null);},onEdit:function(){var inv=preview;setPreview(null);setEditor(inv);}});
  return h('div',null,
    del&&h(ConfirmDialog,{title:'Delete Invoice',message:'Delete this invoice?',onConfirm:function(){deleteInv(del);},onCancel:function(){setDel(null);}}),
    h('div',{style:{marginBottom:12}},h('button',{className:'btn btn-or btn-fw',onClick:function(){setEditor('new');}},'+ Create Invoice')),
    invoices.length>0&&h('div',{className:'summary-grid'},
      h('div',{className:'sum-card gn'},h('div',{className:'sum-lbl'},'Paid'),h('div',{className:'sum-val'},GBP+fmt(paid))),
      h('div',{className:'sum-card rd'},h('div',{className:'sum-lbl'},'Outstanding'),h('div',{className:'sum-val'},GBP+fmt(owed)))
    ),
    h('div',{className:'search-wrap'},h('span',{className:'search-icon'},'\ud83d\udd0d'),h('input',{placeholder:'Search...',value:srch,onChange:function(e){setSrch(e.target.value);}})),
    h('div',{className:'tab-strip'},['All','Paid','Unpaid'].map(function(s){return h('button',{className:'tab-strip-btn'+(filter===s?' active':''),key:s,onClick:function(){setFilter(s);}},s);})),
    filtered.length===0?h('div',{className:'empty'},h('div',{className:'empty-icon'},'\ud83e\uddfe'),h('div',{className:'empty-text'},invoices.length===0?'No invoices yet':'No matches'),invoices.length===0&&h('button',{className:'btn btn-or btn-sm',onClick:function(){setEditor('new');}},'+ Create First Invoice')):
    h('div',{className:'section'},h('div',{style:{padding:'4px 0'}},filtered.map(function(inv){
      var grand=calcTotal(inv.items)*1.2;
      return h('div',{className:'row',key:inv.id},
        h('div',{className:'row-icon '+(inv.paid?'gn':'rd'),onClick:function(){setPreview(inv);}},'\ud83e\uddfe'),
        h('div',{className:'row-body',onClick:function(){setPreview(inv);}},
          h('div',{className:'row-title'},inv.customer),
          h('div',{className:'row-sub'},h('span',null,padId(inv.id,'INV-')),inv.plate&&h('span',null,h('span',{className:'row-sub-dot'},'\u2022'),h('span',{className:'plate',style:{marginLeft:4}},inv.plate)))
        ),
        h('div',{className:'row-end'},
          h('div',{className:'row-amount'},GBP+fmt(grand)),
          h('span',{className:'bdg '+(inv.paid?'bd':'bc')},inv.paid?'Paid':'Unpaid')
        )
      );
    })))
  );
}

        h('div',{className:'frow'},

          h('div',null,h('label',{className:'lbl'},'Email'),h('input',{type:'email',value:gEmail,autoCapitalize:'none',onChange:function(e){setGEmail(e.target.value);}}))

        h('div',null,h('label',{className:'lbl'},'Bank Details'),h('input',{value:gBank,placeholder:'Sort 12-34-56 Acc 12345678',onChange:function(e){setGBank(e.target.value);}})),

        h('button',{className:'btn btn-or btn-fw',onClick:saveProfile},'Save Profile')

    tab==='alerts'&&h('div',{className:'section'},
      h('div',{className:'section-hd'},h('div',{className:'section-title'},'Notification ',h('span',null,'Preferences'))),
      h('div',null,
        h('div',{className:'setting-row'},h('div',{className:'setting-label'},h('div',{className:'setting-label-name'},'MOT Reminders'),h('div',{className:'setting-label-desc'},'Notify when MOTs due')),h('div',{className:'toggle'+(nMot?' on':''),onClick:function(){setNMot(!nMot);}})),

// ── LOGIN ────────────────────────────────────────────────────────
function Login(p){
  var s1=useState('');var email=s1[0];var setEmail=s1[1];
  var s2=useState('');var pass=s2[0];var setPass=s2[1];
  var s3=useState('');var err=s3[0];var setErr=s3[1];
  function login(){
    if(!email.trim()){setErr('Email required');return;}
    if(!pass){setErr('Password required');return;}
    p.onLogin({email:email.trim()});
  }
  function onKey(e){if(e.key==='Enter')login();}
  return h('div',{className:'login'},
    h('div',{className:'login-card'},
      h('div',{className:'login-logo'},
        h('div',{className:'brand'},'COMPARE ',h('span',null,'AUTOMOTIVE')),
        h('div',{className:'brand-sub'},'Garage Management')
      ),
      h('div',{style:{textAlign:'center',marginBottom:22,fontSize:13,color:'var(--muted)'}},'Sign in to your portal'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        h('div',null,h('label',{className:'lbl'},'Email'),h('input',{type:'email',value:email,placeholder:'you@email.com',autoCapitalize:'none',onKeyDown:onKey,onChange:function(e){setEmail(e.target.value);}})),
        h('div',null,h('label',{className:'lbl'},'Password'),h('input',{type:'password',value:pass,onKeyDown:onKey,onChange:function(e){setPass(e.target.value);}})),

  );
}

// ── APP ──────────────────────────────────────────────────────────
function App(){
  var u1=useState(function(){return ld('ca_user',null);});var user=u1[0];var setUserRaw=u1[1];
  var u2=useState('today');var tab=u2[0];var setTab=u2[1];
  var u3=useState({show:false,msg:'',err:false});var toast=u3[0];var setToast=u3[1];
  var u4=useState(function(){return ld('ca_bookings',[]);});var bookings=u4[0];var setBookingsRaw=u4[1];
  var u5=useState(function(){return ld('ca_invoices',[]);});var invoices=u5[0];var setInvoicesRaw=u5[1];
  var u6=useState(function(){return ld('ca_vehicles',[]);});var vehicles=u6[0];var setVehiclesRaw=u6[1];
  var u7=useState(function(){return ld('ca_settings',{});});var settings=u7[0];var setSettingsRaw=u7[1];
  var u8=useState(false);var openBook=u8[0];var setOpenBook=u8[1];
  var u9=useState(null);var editBook=u9[0];var setEditBook=u9[1];

  function showToast(msg,err){setToast({show:true,msg:msg||'\u2713 Saved',err:err||false});setTimeout(function(){setToast({show:false,msg:'',err:false});},2000);}
  function showError(msg){showToast(msg,true);}
  function setUser(v){setUserRaw(v);sv('ca_user',v);}
  function setBookings(v){setBookingsRaw(v);sv('ca_bookings',v);showToast();}
  function setInvoices(v){setInvoicesRaw(v);sv('ca_invoices',v);showToast();}
  function setVehicles(v){setVehiclesRaw(v);sv('ca_vehicles',v);showToast();}
  function setSettings(v){setSettingsRaw(v);sv('ca_settings',v);}
  function logout(){setUser(null);setTab('today');}

  if(!user)return h(Login,{onLogin:function(u){setUser(u);}});

  var titles={today:'Today',bookings:'Bookings',vehicles:'Vehicles',invoices:'Invoices',settings:'Settings'};
  function renderPage(){
    if(tab==='today')return h(Today,{
      bookings:bookings,invoices:invoices,settings:settings,
      openBooking:function(){setTab('bookings');setTimeout(function(){setOpenBook(true);},50);},
      editBooking:function(b){setTab('bookings');setTimeout(function(){setEditBook(b);},50);}
    });
    if(tab==='bookings')return h(Bookings,{
      bookings:bookings,setBookings:setBookings,showError:showError,
      openModal:openBook,clearOpen:function(){setOpenBook(false);},
      editBooking:editBook,clearEdit:function(){setEditBook(null);}
    });

  }

  return h('div',{className:'app'},
    h('div',{className:'m-hdr'},
      h('div',{className:'brand',style:{fontSize:14}},'COMPARE ',h('span',null,'AUTO')),
      h('div',{className:'page-title'},titles[tab]),
      h('button',{className:'m-icon-btn',onClick:function(){setTab('settings');}},'\u2699\ufe0f')
    ),
    h('div',{className:'main'},renderPage()),
    h('nav',{className:'bnav'},h('div',{className:'bnav-inner'},
      h('button',{className:'bni'+(tab==='today'?' active':''),onClick:function(){setTab('today');}},h('span',{className:'bni-icon'},'\ud83c\udfe0'),'Today'),
      h('button',{className:'bni'+(tab==='bookings'?' active':''),onClick:function(){setTab('bookings');}},h('span',{className:'bni-icon'},'\ud83d\udcc5'),'Bookings'),
      h('button',{className:'bni'+(tab==='vehicles'?' active':''),onClick:function(){setTab('vehicles');}},h('span',{className:'bni-icon'},'\ud83d\ude97'),'Vehicles'),
      h('button',{className:'bni'+(tab==='invoices'?' active':''),onClick:function(){setTab('invoices');}},h('span',{className:'bni-icon'},'\ud83e\uddfe'),'Invoices')
    )),
    h('div',{className:'toast'+(toast.show?' show':'')+(toast.err?' err':'')},toast.msg)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
